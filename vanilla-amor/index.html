<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Você</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Áudio de fundo -->
    <audio id="bg-audio" loop>
        <source src="assets/audio/shot-for-me.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <!-- Hero Section -->
        <section class="hero">
            <h1 class="fade-in">fiz uma coisa pra vc...</h1>
            <p class="fade-in delay">desce a página...</p>
        </section>

        <!-- Galeria de Polaroids (Serão inseridas via JS para manter o código limpo) -->
        <div id="gallery"></div>

        <!-- Sessão de Vídeo -->
        <section class="memory-section video-section" id="video-section">
            <div class="video-container horizontal">
                <video controls id="romantic-video">
                    <source src="assets/video/nosso-video.mp4" type="video/mp4">
                    Seu navegador não suporta vídeos.
                </video>
            </div>
        </section>

        <!-- Footer -->
        <section class="footer">
            <h2>Amo você princesa! Você vai estar pra sempre no meu coração.</h2>
            <p class="sub-footer">ainda sou apaixonado nos seus olhinhos</p>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
